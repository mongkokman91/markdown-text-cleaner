name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip and Locate Project
        run: |
          unzip markdown-text-cleaner.zip -d temp_unzip/
          
          # Direct lookup for the directory containing settings.gradle.kts
          ANDROID_DIR=$(find temp_unzip -name "settings.gradle.kts" -exec dirname {} \; | head -n 1)
          
          if [ -z "$ANDROID_DIR" ]; then
            echo "Error: Android project files not found in ZIP!"
            exit 1
          fi
          
          echo "Found Android root at: $ANDROID_DIR"
          
          # Copy the Android files to the root workspace safely
          cp -r $ANDROID_DIR/* .
          rm -rf temp_unzip

      - name: Patch Kotlin to 2.0.0 for Compose Compiler
        run: |
          # Upgrade all Kotlin 1.9.23 references to 2.0.0 so the Compose compiler is compatible
          find . -name "*.kts" -exec sed -i 's/1.9.23/2.0.0/g' {} +
          find . -name "*.toml" -exec sed -i 's/1.9.23/2.0.0/g' {} +

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Gradle Wrapper (If Missing)
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "Gradlew wrapper missing. Generating wrapper..."
            gradle wrapper
          fi
          chmod +x ./gradlew

      - name: Assemble Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Markdown-Cleaner-App
          path: app/build/outputs/apk/debug/app-debug.apk
