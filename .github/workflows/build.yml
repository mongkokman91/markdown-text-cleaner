name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip and Locate Android Project
        run: |
          unzip markdown-text-cleaner.zip -d temp_unzip/
          # Automatically search and find the folder containing 'gradlew'
          GRADLE_DIR=$(find temp_unzip -name "gradlew" -exec dirname {} \;)
          echo "Found Android project at: $GRADLE_DIR"
          # Move all compile files to the workspace root
          cp -r $GRADLE_DIR/* .
          rm -rf temp_unzip

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant Execute Permissions for Gradle
        run: chmod +x ./gradlew

      - name: Assemble Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Markdown-Cleaner-App
          path: app/build/outputs/apk/debug/app-debug.apk
